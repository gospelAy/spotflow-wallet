spring.application.name=spotflow-wallet

spring.datasource.url=jdbc:postgresql://localhost:5432/spotflow_wallet
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spotflow.base-url=https://api.spotflow.co/api/v1
spotflow.secret-key=${SPOTFLOW_SECRET_KEY}
spotflow.webhook-secret=${SPOTFLOW_WEBHOOK_SECRET}
spotflow.main-account-number=${SPOTFLOW_MAIN_ACCOUNT_NUMBER}

reconciliation.cron=0 */15 * * * *
reconciliation.stuck-after-minutes=60

server.port=8085